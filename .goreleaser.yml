# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
version: 2
before:
  hooks:
    - go mod download
builds:
  - id: "cli-amd64"
    env:
      - CGO_ENABLED=0
    main: ./cmd/start_server
    goos:
      - linux
      - darwin
    goarch:
      - amd64
    binary: start_server
    ldflags:
      - -s -w
      - -X github.com/shogo82148/server-starter.version={{.Version}}
  - id: "cli-arm64"
    env:
      - CGO_ENABLED=0
    main: ./cmd/start_server
    goos:
      - linux
      - darwin
    goarch:
      - arm64
    binary: start_server
    ldflags:
      - -s -w
      - -X github.com/shogo82148/server-starter.version={{.Version}}
      - -X github.com/shogo82148/server-starter.commit={{.ShortCommit}}
archives:
  - ids:
      - cli-amd64
      - cli-arm64
    name_template: "start_server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  use: github-native

nfpms:
  - id: package-amd64
    ids:
      - cli-amd64
    package_name: go-server-starter
    homepage: https://github.com/shogo82148/server-starter/
    maintainer: Ichinose Shogo <shogo82148@gmail.com>
    description: Yet Another Go port of start_server by shogo82148
    license: MIT
    formats:
      - apk
      - deb
      - rpm
    release: 1
    epoch: 0
    bindir: /usr/bin
  - id: package-arm64
    ids:
      - cli-arm64
    package_name: go-server-starter
    homepage: https://github.com/shogo82148/server-starter/
    maintainer: Ichinose Shogo <shogo82148@gmail.com>
    description: Yet Another Go port of start_server by shogo82148
    license: MIT
    formats:
      - apk
      - deb
      - rpm
    release: 1
    epoch: 0
    bindir: /usr/bin

blobs:
  # Amazon Linux 2023
  - provider: s3
    bucket: shogo82148-rpm-temporary
    ids: [package-amd64]
    directory: amazonlinux/2023/x86_64/go-server-starter
  - provider: s3
    bucket: shogo82148-rpm-temporary
    ids: [package-arm64]
    directory: amazonlinux/2023/aarch64/go-server-starter

  # CentOS 7
